version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: nexusflow-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: nexusflow

      POSTGRES_USER: nexusflow

      POSTGRES_PASSWORD: nexusflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: